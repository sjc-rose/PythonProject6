name: Daily Report

on:
  schedule:
    # 设定在 UTC 03:05，即首尔/北京时间 12:05
    - cron: '5 3 * * *'
  workflow_dispatch: # 保持开启，方便你手动测试

jobs:
  run-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests openai

      - name: Run analysis
        env:
          NEWS_KEY: ${{ secrets.NEWS_KEY }}
          AI_KEY: ${{ secrets.AI_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python daily_report.py