name: Daily Report
on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上 8 点
  workflow_dispatch: # 允许手动点击按钮测试
jobs:
  run-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests openai
      - name: Run analysis
        env:
          NEWS_KEY: ${{ secrets.NEWS_KEY }}
          AI_KEY: ${{ secrets.AI_KEY }}
          MAIL_AUTH: ${{ secrets.MAIL_AUTH }}
        run: python daily_report.py