name: Daily Report

on:
  schedule:
    # 定时任务：UTC 00:00 = 北京时间 08:00
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动点击按钮测试

jobs:
  run-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests openai

      - name: Run analysis
        env:
          # 将 GitHub Secrets 映射给 Python 环境变量
          NEWS_KEY: ${{ secrets.NEWS_KEY }}
          AI_KEY: ${{ secrets.AI_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python daily_report.py